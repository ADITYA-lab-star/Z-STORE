name: Production CI/CD Workflow

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Trigger Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Verify Frontend Build
        working-directory: ./frontend
        run: |
          echo "Installing frontend dependencies..."
          npm ci
          echo "Building Vite/React application..."
          npm run build

      - name: Verify Backend Build/Dependencies
        working-directory: ./backend
        run: |
          echo "Installing backend dependencies..."
          npm ci
          echo "Running backend build (if present)..."
          npm run build --if-present

      - name: Test Backend Docker Build
        run: docker build -t z-store-backend ./backend

      - name: Test Frontend Docker Build
        run: docker build -t z-store-frontend ./frontend

      - name: Trigger Render Deploy Hook (Backend)
        env:
          # Ensure you add RENDER_DEPLOY_HOOK_URL in your GitHub repository secrets
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Warning: RENDER_DEPLOY_HOOK_URL secret is not configured. Skipping webhook trigger."
            exit 1
          else
            echo "Triggering Render deployment for the backend..."
            curl -X POST "$RENDER_DEPLOY_HOOK_URL"
          fi
