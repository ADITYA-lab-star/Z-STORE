server {
    listen 80;
    
    # Root directory where the static files are served from
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Support React Router: If a file isn't found, fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Error handling
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
